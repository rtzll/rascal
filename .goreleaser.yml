version: 2

builds:
  - id: rascal
    main: ./cmd/rascal
    binary: rascal
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/rtzll/rascal/internal/buildinfo.Version={{.Version}}
      - -X github.com/rtzll/rascal/internal/buildinfo.Commit={{.ShortCommit}}
      - -X github.com/rtzll/rascal/internal/buildinfo.Date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: rascal
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      rascal_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
