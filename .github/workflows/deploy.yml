name: Deploy Rascal

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-rascal-main
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare deploy
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_deploy: ${{ steps.decision.outputs.should_deploy }}
      checkout_ref: ${{ steps.decision.outputs.checkout_ref }}
    steps:
      - name: Checkout workflow run commit
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: Checkout current ref
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Decide whether to deploy
        id: decision
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "checkout_ref=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "checkout_ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"

          if ! git rev-parse HEAD^ >/dev/null 2>&1; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only HEAD^ HEAD)"
          if [ -n "$changed_files" ] && printf '%s\n' "$changed_files" | grep -qvE '^(docs/|.*\.md$)'; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          echo "Docs-only main update; skipping deploy."

  deploy:
    name: Deploy to server
    needs: prepare
    if: needs.prepare.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DEPLOY_HOST: ${{ vars.RASCAL_DEPLOY_HOST || secrets.RASCAL_DEPLOY_HOST }}
      DEPLOY_USER: ${{ vars.RASCAL_DEPLOY_SSH_USER || secrets.RASCAL_DEPLOY_SSH_USER || 'root' }}
      DEPLOY_PORT: ${{ vars.RASCAL_DEPLOY_SSH_PORT || secrets.RASCAL_DEPLOY_SSH_PORT || '22' }}
      DEPLOY_RUNNER_IMAGE: ${{ vars.RASCAL_RUNNER_IMAGE || 'rascal-runner:latest' }}
      DEPLOY_DOMAIN: ${{ vars.RASCAL_DOMAIN || secrets.RASCAL_DOMAIN || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate deploy config
        run: |
          if [ -z "${DEPLOY_HOST:-}" ]; then
            echo "Missing DEPLOY_HOST. Set vars/secrets RASCAL_DEPLOY_HOST." >&2
            exit 1
          fi
          if [ -z "${{ secrets.RASCAL_DEPLOY_SSH_KEY }}" ]; then
            echo "Missing secret RASCAL_DEPLOY_SSH_KEY." >&2
            exit 1
          fi
          if [ -z "${{ secrets.RASCAL_DEPLOY_KNOWN_HOSTS }}" ]; then
            echo "Missing secret RASCAL_DEPLOY_KNOWN_HOSTS." >&2
            exit 1
          fi

      - name: Configure SSH
        run: |
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "${{ secrets.RASCAL_DEPLOY_SSH_KEY }}" > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "${{ secrets.RASCAL_DEPLOY_KNOWN_HOSTS }}" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/id_ed25519"
          chmod 644 "$HOME/.ssh/known_hosts"

      - name: Mask deploy endpoints
        run: |
          if [ -n "${DEPLOY_HOST:-}" ]; then
            echo "::add-mask::${DEPLOY_HOST}"
          fi
          if [ -n "${DEPLOY_DOMAIN:-}" ]; then
            echo "::add-mask::${DEPLOY_DOMAIN}"
            echo "::add-mask::https://${DEPLOY_DOMAIN}"
            echo "::add-mask::http://${DEPLOY_DOMAIN}"
          fi

      - name: Deploy
        run: |
          go build -o ./bin/rascal ./cmd/rascal
          ./bin/rascal deploy \
            --host "${DEPLOY_HOST}" \
            --ssh-user "${DEPLOY_USER}" \
            --ssh-port "${DEPLOY_PORT}" \
            --ssh-key "$HOME/.ssh/id_ed25519" \
            --domain "${DEPLOY_DOMAIN}" \
            --runner-image "${DEPLOY_RUNNER_IMAGE}"
